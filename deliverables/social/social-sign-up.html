html,body{font-family:'Mont',system-ui,sans-serif}
.sq{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;
  color:#fff;padding:96px 92px;background:linear-gradient(155deg,#0A4FC4,#002A73)}
.sq.red{background:linear-gradient(155deg,#D3122F,#7d0a1c)}
.sq.green{background:linear-gradient(155deg,#1E9E62,#0d4e30)}
.sq .logo{height:100px;width:auto;flex:none;align-self:flex-start}
.sq .kick{margin-top:auto;font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:26px;color:#BFD6F7}
.sq.red .kick{color:#F6C9CF}.sq.green .kick{color:#BEE7CF}
.sq h1{font-weight:900;line-height:.96;letter-spacing:-.01em;margin-top:14px;font-size:104px}
.sq p{font-weight:600;font-size:34px;line-height:1.32;margin-top:26px;color:#DCE8FA;max-width:820px}
.sq.red p{color:#FBE1E4}.sq.green p{color:#DBF2E5}
.bottom{margin-top:auto;display:flex;align-items:center;gap:40px}
.qrbox{flex:none;width:236px;height:236px;background:#fff;border-radius:20px;padding:16px}
.qrbox img{width:100%;height:100%}
.bottom .info .u{font-weight:800;font-size:30px;color:#fff;word-break:break-all}
.bottom .info .r{margin-top:14px;font-weight:700;font-size:27px;color:#BFD6F7}
.sq.red .bottom .info .r{color:#F6C9CF}.sq.green .bottom .info .r{color:#BEE7CF}
.pill{display:inline-block;background:rgba(255,255,255,.16);border-radius:999px;padding:12px 26px;font-weight:800;font-size:28px;margin-top:8px}
.bg{position:absolute;inset:0;z-index:0}.bg img{width:100%;height:100%;object-fit:cover}
